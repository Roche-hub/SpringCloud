server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  port: 8000

spring:
  profiles:
    active: test
  application:
    name: service-order
  cloud:
    nacos:
      server-addr: 47.111.179.30:8848
      config:
        namespace: ${spring.profiles.active:dev}
---
spring:
  config:
    import:
      - nacos:common.properties?group=order
      - nacos:database.properties?group=order
    active:
      on-profile: dev

---
spring:
  config:
    import:
      - nacos:common.properties?group=order
      - nacos:database.properties?group=order
    active:
      on-profile: test

